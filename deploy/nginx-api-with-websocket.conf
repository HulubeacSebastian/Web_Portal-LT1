# /etc/nginx/conf.d/portal-ws-upgrade-map.conf (o singura data pe server)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# /etc/nginx/sites-available/api pe VM-ul BACKEND (api-lt1.duckdns.org)

server {
    server_name api-lt1.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api-lt1.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-lt1.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api-lt1.duckdns.org) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api-lt1.duckdns.org;
    return 404;
}
