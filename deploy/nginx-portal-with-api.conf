# Exemplu: /etc/nginx/sites-available/portal pe VM-ul FRONTEND (portal-lt1.duckdns.org)
# Proxy HTTP catre API — browserul apeleaza acelasi domeniu (fara CORS).

server {
    server_name portal-lt1.duckdns.org;
    root /var/www/portal;
    index index.html;

    location /api/ {
        proxy_pass https://api-lt1.duckdns.org/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host api-lt1.duckdns.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass https://api-lt1.duckdns.org/health;
        proxy_ssl_server_name on;
        proxy_set_header Host api-lt1.duckdns.org;
    }

    # Chat + notificari documente (WebSocket) — acelasi domeniu ca site-ul
    location /ws {
        proxy_pass https://api-lt1.duckdns.org/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host api-lt1.duckdns.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/portal-lt1.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal-lt1.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = portal-lt1.duckdns.org) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name portal-lt1.duckdns.org;
    return 404;
}
